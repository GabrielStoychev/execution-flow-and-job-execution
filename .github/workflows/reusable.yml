name: Reusable Deploy
on: 
  workflow_call:
    inputs:
        artifact-name:
            description: The name of the deployable artifact files
            required: false
            default: dist
            type: string
    outputs:
        result:
            description: The result of the deploymen operation
            value: ${{ jobs.deploy.outputs.outcome }}

    secrets: 
        my-little-secret:
            required: true
                
jobs:
    deploy:
        outputs: 
            outcome: $ {{ steps.set-result.ouputs.step-result }}
        runs-on: ubuntu-latest
        steps:
            - name: Output info
              uses: actions/download-artifact@v3
              with:
                name: $ {{ inputs.artifact-name }}
            - name: List files
              run: ls
            - name: Output informations
              run: echo "Deploying & uploading..."
            - name: Set result ouput
              run: echo "step-result=success" >> $GITHUB_OUTPUT
