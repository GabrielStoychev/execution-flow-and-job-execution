name: Matrix Demo
on: push
jobs:
    build:
      continue-on-error: true
      strategy:
        matrix:
            node-version: [12, 14,6]
            os: [ubuntu-latest, windows-latest]
      runs-on: ${{ matrix.os }}
      steps:
        - name: Get Code
          uses: actions/checkout@v3
        - name: Install NodeJS
          uses: actions/setup0node@v3
          with:
            node-version: 1${{ matrix.node-version }}
        - name: Install Dependencies
          run: npm ci
        - name: Build project
          run: npm run build